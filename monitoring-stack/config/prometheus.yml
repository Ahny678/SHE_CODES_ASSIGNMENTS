global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus monitoring itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter (system metrics)
  - job_name: "pay-api-system"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          app: "pay-api-system"

  # Your app metrics
  - job_name: "pay-api-app"
    static_configs:
      - targets: ["pay-api:5000"]
        labels:
          app: "pay-api-app"

